<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>测一测，在知否的世界里，谁是你的命定伴侣？</title>
  <style>
    :root {
      --bg-1: #f4f7ff;
      --bg-2: #eef1ff;
      --ink: #2e3552;
      --muted: #677099;
      --primary: #7585d8;
      --primary-deep: #5d6dc4;
      --card: #fbfcff;
      --line: #d8def8;
      --leaf: #95b99d;
      --shadow: rgba(87, 102, 166, 0.15);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 18%, #ffffff 0, #ffffff66 22%, transparent 45%),
        radial-gradient(circle at 88% 12%, #ede7ff 0, #ede7ff88 22%, transparent 45%),
        linear-gradient(170deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
    }

    .page { max-width: 980px; margin: 0 auto; padding: 24px 16px 60px; position: relative; }
    .ornament { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .leaf { position: absolute; width: 84px; height: 42px; border-radius: 84px 84px 0 84px; background: linear-gradient(140deg, #b7d2bf, var(--leaf)); opacity: 0.24; transform: rotate(-20deg); }
    .leaf.a { top: 52px; left: -20px; }
    .leaf.b { top: 160px; right: -16px; transform: rotate(20deg) scaleX(-1); }
    .leaf.c { bottom: 90px; left: 8px; transform: rotate(-45deg); }
    .leaf.d { bottom: 20px; right: 20px; transform: rotate(45deg) scaleX(-1); }

    .hero {
      position: relative;
      background: linear-gradient(180deg, #fdfdff, #f7f9ff);
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 26px 22px 20px;
      box-shadow: 0 10px 24px var(--shadow), 4px 4px 0 #d7defa;
      margin-bottom: 14px;
    }

    h1 { margin: 0 0 10px; font-size: clamp(24px, 4vw, 34px); color: #46538f; line-height: 1.3; }
    .subtitle { margin: 0; color: var(--muted); line-height: 1.75; font-size: 15px; }

    .progress { position: sticky; top: 10px; z-index: 30; margin: 14px 0 22px; padding: 10px 12px; border: 2px solid var(--line); border-radius: 12px; background: #fdfdffde; backdrop-filter: blur(5px); }
    .progress-track { height: 10px; border-radius: 999px; background: #e7ebfc; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #9eadef, var(--primary)); transition: width .25s ease; }
    .progress-text { margin-top: 8px; font-size: 13px; color: var(--muted); }

    .section { margin: 26px 0 14px; padding: 8px 10px; border-left: 4px solid var(--primary); background: #f5f7ffb8; color: #4c5b98; font-size: 17px; font-weight: 700; border-radius: 6px; }
    .question { margin: 0 0 14px; background: var(--card); border: 2px solid var(--line); border-radius: 12px; padding: 14px; box-shadow: 2px 2px 0 #e4e9ff; }
    .q-title { margin: 0 0 12px; font-size: 16px; line-height: 1.75; }
    .options { display: grid; gap: 10px; }

    .option { display: flex; align-items: flex-start; gap: 10px; border: 1px solid #dce2fb; border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: all .2s ease; background: #ffffff; }
    .option:hover { border-color: #b9c4f4; transform: translateY(-1px); box-shadow: 0 6px 14px #9aa9e224; }
    .option input { margin-top: 3px; accent-color: var(--primary); }
    .option span { line-height: 1.7; }

    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    button { border: none; border-radius: 10px; padding: 10px 16px; font-size: 15px; cursor: pointer; transition: all .2s ease; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-deep)); color: #fff; box-shadow: 0 8px 16px #7786d63b; }
    .btn-ghost { background: #f0f3ff; color: #4b598f; border: 1px solid #cfd8fb; }

    #result { margin-top: 22px; border: 2px solid #cdd6fb; border-radius: 14px; background: #fcfdff; padding: 20px 18px; display: none; box-shadow: 0 12px 24px var(--shadow), 4px 4px 0 #d5dcfb; }
    .result-type { font-size: clamp(20px, 3.6vw, 28px); margin: 0 0 10px; color: #455190; }
    .result-visual { display: flex; gap: 12px; align-items: center; padding: 10px 12px; border: 1px solid #d9e0fb; border-radius: 10px; background: #f5f8ff; }
    .avatar-box { width: 160px; height: 160px; border: 2px solid #cfd7fb; border-radius: 10px; image-rendering: pixelated; background: #eef2ff; box-shadow: 3px 3px 0 #d9e0fb, inset 0 0 0 2px #edf1ff; flex: none; }
    .avatar-note { font-size: 13px; color: #66709a; line-height: 1.7; }
    .result-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 12px; }
    .result-item { border: 1px solid #d9e0fb; border-radius: 10px; background: #f8faff; padding: 10px 12px; }
    .result-item h3 { margin: 0 0 6px; font-size: 14px; color: #5d69a7; }
    .result-item p, .result-item code { margin: 0; line-height: 1.7; font-size: 14px; color: #2f3551; word-break: break-word; font-family: "Noto Serif SC", "Songti SC", "STSong", serif; }
    .dim { margin-top: 10px; color: #606a97; font-size: 13px; line-height: 1.8; }
    .footer-note { margin-top: 18px; color: #6f779b; font-size: 13px; }

    @media (max-width: 640px) {
      .page { padding: 16px 12px 42px; }
      .hero { padding: 18px 14px; }
      .question { padding: 12px; }
      .option { padding: 8px 10px; }
      .result-visual { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="ornament"><span class="leaf a"></span><span class="leaf b"></span><span class="leaf c"></span><span class="leaf d"></span></div>
    <header class="hero">
      <h1>测一测，在知否的世界里，谁是你的命定伴侣？</h1>
      <p class="subtitle">重构版：题目统一为“你期待对方怎么做”，并采用“维度 + 风格”双引擎匹配，避免结果单一化。</p>
    </header>

    <div class="progress">
      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
      <div id="progressText" class="progress-text">已完成 0 / 25</div>
    </div>

    <form id="quiz"></form>
    <div class="actions">
      <button class="btn-primary" type="button" id="submitBtn">查看我的结果</button>
      <button class="btn-ghost" type="button" id="resetBtn">重置测试</button>
    </div>
    <section id="result"></section>
  </main>

  <script>
    const questions = [
      { s: "1️⃣ 爱的表达方式（情感需求）", dim: "E", q: "1. 你连续两周加班到很晚，你最期待对方：", o: [{ t: "只要发消息安慰你就好", v: 2, s: "empathy" }, { t: "到公司楼下接你回家", v: 3, s: "presence" }, { t: "先听你说，再问你真正需要什么", v: 4, s: "co" }, { t: "提醒你别再硬扛，明确作息边界", v: 2, s: "boundary" }, { t: "直接帮你调整下周日程和分工", v: 5, s: "system" }] },
      { s: "1️⃣ 爱的表达方式（情感需求）", dim: "E", q: "2. 你生日被工作打断，你最期待对方：", o: [{ t: "先把你情绪哄好", v: 3, s: "empathy" }, { t: "当天短暂出现，确保你不落单", v: 4, s: "presence" }, { t: "询问你想补过还是改成小庆祝", v: 3, s: "co" }, { t: "把今后重要日子冲突提前约法", v: 2, s: "boundary" }, { t: "把补庆祝和工作善后打包安排", v: 5, s: "system" }] },
      { s: "1️⃣ 爱的表达方式（情感需求）", dim: "E", q: "3. 你生病发烧时，你最期待对方：", o: [{ t: "频繁关心你有没有好一点", v: 3, s: "empathy" }, { t: "到场照顾并陪你去医院", v: 4, s: "presence" }, { t: "先确认你的照护偏好再行动", v: 3, s: "co" }, { t: "提醒你必须休息，拒绝继续工作", v: 2, s: "boundary" }, { t: "药、复诊、饮食、请假一并安排", v: 5, s: "system" }] },
      { s: "1️⃣ 爱的表达方式（情感需求）", dim: "E", q: "4. 你接到升职机会但压力翻倍，你最期待对方：", o: [{ t: "先给你情绪上的肯定与鼓励", v: 3, s: "empathy" }, { t: "陪你熬过最忙的前两周", v: 4, s: "presence" }, { t: "和你把利弊讲透再由你决定", v: 3, s: "co" }, { t: "提醒你明确可承受上限", v: 2, s: "boundary" }, { t: "帮你做风险预案并定期复盘", v: 5, s: "system" }] },
      { s: "1️⃣ 爱的表达方式（情感需求）", dim: "E", q: "5. 约会被他家突发事务打断，你最期待对方：", o: [{ t: "先安抚你的失落，不让你硬撑", v: 3, s: "empathy" }, { t: "处理完马上回来见你", v: 4, s: "presence" }, { t: "和你商量补偿方式与时间", v: 3, s: "co" }, { t: "以后同类情况先报备再取消", v: 2, s: "boundary" }, { t: "直接重排后续两周约会计划", v: 5, s: "system" }] },

      { s: "2️⃣ 婚姻观与安全感（核心区分）", dim: "R", q: "6. 你最近工作压力很大，经常加班到很晚。伴侣提议两人一起出门旅行放松，但你觉得旅行会耽误工作，而且近期花费较多。你会？", o: [{ t: "直接拒绝，认为工作更重要，伴侣应该理解", v: 4, s: "boundary" }, { t: "委婉解释，但坚持不去，建议伴侣自己去或找朋友", v: 3, s: "boundary" }, { t: "犹豫不决，最后可能妥协，但心里不太情愿", v: 2, s: "co" }, { t: "同意去，但要求缩短行程，且路上还要处理工作", v: 5, s: "system" }, { t: "欣然同意，认为伴侣开心和关系维护比工作重要，钱可以再赚", v: 1, s: "empathy" }] },
      { s: "2️⃣ 婚姻观与安全感（核心区分）", dim: "R", q: "7. 你们计划买房。你的存款足够付首付，但伴侣存款较少。伴侣希望房产写两人名字，并且共同还贷。你的态度是？", o: [{ t: "必须只写自己名字，因为主要出资，伴侣还款能力不足", v: 4, s: "boundary" }, { t: "写两人名字，但签订协议明确出资比例，离婚按比例分", v: 5, s: "system" }, { t: "无所谓，信任伴侣，写两人名字，不签协议", v: 1, s: "empathy" }, { t: "只写伴侣名字，表示诚意和爱，自己愿意付出", v: 2, s: "presence" }, { t: "要求伴侣家里也出钱，否则不写名字，且要求伴侣提高收入", v: 3, s: "boundary" }] },
      { s: "2️⃣ 婚姻观与安全感（核心区分）", dim: "R", q: "8. 你和伴侣已经同居/结婚两年。某天你发现伴侣背着你给TA的父母转了5万元（从你们共同存款中支出）。你的反应是？", o: [{ t: "完全不在意，那是TA的钱，孝敬父母应该的", v: 1, s: "empathy" }, { t: "有点不舒服，但理解，会温和地建议下次提前说一声", v: 2, s: "co" }, { t: "很生气，认为这是不尊重你，要求TA立刻把钱要回来", v: 4, s: "boundary" }, { t: "表面不说什么，但开始留意家庭财务，暗暗计划AA制", v: 5, s: "system" }, { t: "直接提出离婚或分手，认为这是欺骗和背叛", v: 3, s: "boundary" }] },
      { s: "2️⃣ 婚姻观与安全感（核心区分）", dim: "R", q: "9. 你因工作需要调到另一个城市一年，伴侣无法跟去。关于异地期间的关系维护，你的想法是？", o: [{ t: "顺其自然，每天联系太累，隔几天打个电话就行，相信感情", v: 2, s: "presence" }, { t: "约定每天视频通话，定期互相探望，尽量保持亲密", v: 4, s: "co" }, { t: "交给伴侣决定，TA想怎样就怎样，自己配合", v: 1, s: "empathy" }, { t: "要求伴侣必须每个月来看自己，否则就是不够爱", v: 5, s: "boundary" }, { t: "反对异地，认为一定会出问题，要么放弃工作机会，要么分手", v: 3, s: "boundary" }] },
      { s: "2️⃣ 婚姻观与安全感（核心区分）", dim: "R", q: "10. 情绪低落时，你通常希望伴侣做什么？", o: [{ t: "什么都不要做，让我一个人静静，别烦我就行", v: 2, s: "boundary" }, { t: "简单问一句“还好吗”，然后给我空间，但随时可找TA", v: 3, s: "presence" }, { t: "耐心听我倾诉，给我拥抱和安慰的语言", v: 4, s: "empathy" }, { t: "主动帮我分析问题，给出解决方案，替我行动", v: 5, s: "system" }, { t: "用各种方式哄我开心，带我出去吃、玩，直到我情绪好转", v: 1, s: "presence" }] },

      { s: "3️⃣ 价值观与冲突处理（高质量区分）", dim: "T", q: "11. 你和伴侣关于是否要孩子产生了分歧（你想要，TA不想要，或反之）。你会？", o: [{ t: "坚持自己的立场，试图说服对方，认为这是原则问题不能让步", v: 4, s: "boundary" }, { t: "尊重对方，但继续沟通，寻求妥协方案（如晚几年再要）", v: 3, s: "co" }, { t: "为了关系和谐，放弃自己的立场，听从对方的决定", v: 1, s: "presence" }, { t: "回避讨论，觉得时间会改变一切，等以后再说", v: 2, s: "empathy" }, { t: "认为这是不可调和的矛盾，考虑分手/离婚", v: 5, s: "boundary" }] },
      { s: "3️⃣ 价值观与冲突处理（高质量区分）", dim: "T", q: "12. 你的伴侣最近迷上了一个高消费的爱好（如滑雪、摄影、买奢侈品），每月花费近一半收入。你会？", o: [{ t: "支持TA，人要有爱好，钱可以再赚，开心最重要", v: 1, s: "empathy" }, { t: "不过问，只要不影响基本生活，随TA去", v: 2, s: "presence" }, { t: "委婉提醒，建议设定每月预算，避免过度消费", v: 3, s: "co" }, { t: "明确反对，要求TA缩减爱好支出，认为这是不负责任", v: 4, s: "boundary" }, { t: "直接没收TA的信用卡或控制家庭财政，强制管理", v: 5, s: "system" }] },
      { s: "3️⃣ 价值观与冲突处理（高质量区分）", dim: "T", q: "13. 你和伴侣一起参加朋友聚会。聚会上，伴侣当着众人的面，说了一件你觉得很尴尬的关于你的糗事，大家笑得很开心。你会？", o: [{ t: "当场翻脸，指责伴侣不尊重你，然后离席", v: 1, s: "boundary" }, { t: "强颜欢笑，但回家后和伴侣大吵一架", v: 2, s: "empathy" }, { t: "私下低声告诉伴侣你不喜欢这样，希望下次注意", v: 3, s: "co" }, { t: "无所谓，觉得是小事，自己也跟着笑", v: 4, s: "presence" }, { t: "记在心里，之后找机会在朋友面前说伴侣的糗事报复", v: 5, s: "system" }] },
      { s: "3️⃣ 价值观与冲突处理（高质量区分）", dim: "T", q: "14. 你获得了一个升职机会，但需要经常出差和应酬。伴侣表示不满，希望你能多顾家。你会？", o: [{ t: "拒绝升职，以家庭为重，认为伴侣的感受更重要", v: 1, s: "presence" }, { t: "与伴侣商量，寻求折中，比如减少部分出差任务或提高家庭补偿", v: 3, s: "co" }, { t: "坚持升职，认为事业机会难得，要求伴侣理解和支持", v: 4, s: "boundary" }, { t: "暂时接受升职，观察一段时间，如果伴侣持续不满再调整", v: 2, s: "system" }, { t: "认为伴侣不支持自己就是不爱，直接提分手/离婚", v: 5, s: "boundary" }] },
      { s: "3️⃣ 价值观与冲突处理（高质量区分）", dim: "T", q: "15. 你和伴侣因为家务分配不均发生争吵。你的处理方式是？", o: [{ t: "冷静下来，制定一个公平的家务表，按劳分配", v: 5, s: "system" }, { t: "主动承担更多，避免争吵，息事宁人", v: 2, s: "presence" }, { t: "坚持自己做得够多了，要求伴侣承担一半，否则不做", v: 4, s: "boundary" }, { t: "请第三方（父母或朋友）来评理，或请钟点工解决", v: 3, s: "co" }, { t: "每次争吵就冷战，直到对方先道歉", v: 1, s: "empathy" }] },

      { s: "4️⃣ 情绪与争吵模式（关系体验）", dim: "C", q: "16. 你和伴侣因为一件小事（例如谁忘了丢垃圾）在晚饭时吵了起来。你当时情绪比较激动。你会？", o: [{ t: "立刻提高音量，把不满全部说出来，吵完为止", v: 1, s: "empathy" }, { t: "强迫自己冷静，说“我们先吃饭，吃完再说”，然后饭后继续讨论", v: 4, s: "co" }, { t: "不再说话，沉默冷战，等对方主动来哄或道歉", v: 2, s: "boundary" }, { t: "当场道歉，哪怕觉得自己没错，只想尽快结束争吵", v: 3, s: "presence" }, { t: "借故离开（去阳台、洗手间），平复心情后再回来沟通", v: 5, s: "system" }] },

        </div>
        <div class="result-grid">
          <article class="result-item"><h3>为什么匹配</h3><p>${best.why}</p></article>
          <article class="result-item"><h3>关系隐患</h3><p>${best.risk}</p></article>
          <article class="result-item"><h3>关系建议</h3><p>${best.advice}</p></article>
          <article class="result-item"><h3>一句话标签</h3><p>${best.tag}</p></article>
          <article class="result-item"><h3>像素头像 Prompt</h3><code>${best.prompt}</code></article>
        </div>
        <div class="dim">你的隐藏维度：情感表达需求 ${levelLabel(avg.E)}（${avg.E.toFixed(1)}）｜现实权重 ${levelLabel(avg.R)}（${avg.R.toFixed(1)}）｜关系策略 ${levelLabel(avg.T)}（${avg.T.toFixed(1)}）｜冲突控制感 ${levelLabel(avg.C)}（${avg.C.toFixed(1)}）｜责任承压 ${levelLabel(avg.D)}（${avg.D.toFixed(1)}）</div>
      `;
      resultEl.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function resetQuiz() {
      quizEl.querySelectorAll("input[type='radio']").forEach(i => i.checked = false);
      progressBar.style.width = "0%";
      progressText.textContent = `已完成 0 / ${activeQuestions.length}`;
      resultEl.style.display = "none";
      resultEl.innerHTML = "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.getElementById("submitBtn").addEventListener("click", calculateResult);
    document.getElementById("resetBtn").addEventListener("click", resetQuiz);
    renderQuiz();
  </script>
</body>
</html>
